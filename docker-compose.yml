services:
  qdrant-mcp:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FASTMCP_HOST: "0.0.0.0"
      NAMESPACE: "qdrant"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
